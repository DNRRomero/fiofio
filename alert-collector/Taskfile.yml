version: "3"

vars:
  IMAGE_NAME: alert-collectors
  IMAGE_TAG: latest

tasks:
  setup:
    desc: Setup development environment
    cmds:
      - uv sync
  lint:
    desc: Run Ruff lint checks
    cmds:
      - uv run ruff check

  fmt:
    desc: Format code with Ruff
    cmds:
      - uv run ruff format

  test:
    desc: Run test suite
    cmds:
      - uv run pytest

  build:
    desc: Build Docker image from .docker/Dockerfile
    cmds:
      - docker build -f .docker/Dockerfile -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} .
