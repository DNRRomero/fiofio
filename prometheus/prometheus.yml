global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: alert-collector-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - alert-collector-api:8000
  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
