services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alerts
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerts -d alerts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  external-mock:
    build:
      context: ./externalMock
      dockerfile: .docker/Dockerfile
    command: >
      sh -c "export ACCEPTED_TOKEN=$(cat /run/secrets/external_mock_token) &&
      exec uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      RNG_SEED: "42"
      FORCE_ERROR: "false"
    secrets:
      - external_mock_token
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  alert-collector-api:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command: >
      sh -c "alembic upgrade head && python -m alert_collector.cli api --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      RABBIT_MQ: amqp://guest:guest@rabbitmq:5672//
      EXTERNAL_SERVICE_HOST: http://external-mock:8000
      SYNC_FREQUENCY_MINUTES: "15"
      SERVICE_HOST: http://localhost:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  alert-collector-worker:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command:
      [
        "python",
        "-m",
        "alert_collector.cli",
        "worker",
        "--log-level",
        "${LOG_LEVEL:-INFO}",
      ]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RABBIT_MQ: amqp://guest:guest@rabbitmq:5672//
      EXTERNAL_SERVICE_HOST: http://external-mock:8000
      SYNC_FREQUENCY_MINUTES: "15"
      SERVICE_HOST: http://alert-collector-api:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    networks:
      - alert-collector-network

  alert-collector-beat:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command:
      [
        "python",
        "-m",
        "alert_collector.cli",
        "beat",
        "--log-level",
        "${LOG_LEVEL:-INFO}",
      ]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RABBIT_MQ: amqp://guest:guest@rabbitmq:5672//
      EXTERNAL_SERVICE_HOST: http://external-mock:8000
      SYNC_FREQUENCY_MINUTES: "15"
      SERVICE_HOST: http://alert-collector-api:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    networks:
      - alert-collector-network

networks:
  alert-collector-network:

volumes:
  postgres-data:

secrets:
  postgres_user:
    file: ./secrets/postgres_user
  postgres_password:
    file: ./secrets/postgres_password
  external_mock_token:
    file: ./secrets/external_mock_token
  collector_database_url:
    file: ./secrets/collector_database_url
