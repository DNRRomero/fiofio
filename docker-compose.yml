services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alerts
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerts -d alerts"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    command: ["/bin/sh", "/etc/rabbitmq/bootstrap.sh"]
    volumes:
      - ./rabbitmq/bootstrap.sh:/etc/rabbitmq/bootstrap.sh:ro
      - ./rabbitmq/rabbitmq.conf.template:/etc/rabbitmq/rabbitmq.conf.template:ro
    secrets:
      - rabbitmq_user
      - rabbitmq_password
      - rabbitmq_ca_cert
      - rabbitmq_server_cert
      - rabbitmq_server_key
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - broker-network

  external-mock:
    build:
      context: ./externalMock
      dockerfile: .docker/Dockerfile
    command: >
      sh -c "export ACCEPTED_TOKEN=$(cat /run/secrets/external_mock_token) &&
      exec uvicorn external_mock.main:app --app-dir /app/src --host 0.0.0.0 --port 8000"
    environment:
      RNG_SEED: "42"
      FORCE_ERROR: "false"
      ERROR_PROBABILITY: ${MOCK_ERROR_PROBABILITY}
    secrets:
      - external_mock_token
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  alert-collector-api:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command: >
      sh -c "alembic upgrade head && python -m alert_collector.cli api --host 0.0.0.0 --port 8000"
    expose:
      - "8000"
    environment:
      EXTERNAL_SERVICE_HOST: http://external-mock:8000
      PROMETHEUS_URL: http://prometheus:9090
      SYNC_FREQUENCY_MINUTES: "15"
      SERVICE_HOST: http://localhost:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
    depends_on:
      postgres:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alert-collector-network

  alert-collector-nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:8080"
    volumes:
      - ./alert-collector/nginx/alert-collector.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      alert-collector-api:
        condition: service_healthy
    networks:
      - alert-collector-network

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      alert-collector-api:
        condition: service_healthy
    networks:
      - alert-collector-network

  alert-collector-worker:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command:
      [
        "python",
        "-m",
        "alert_collector.cli",
        "worker",
        "--log-level",
        "${LOG_LEVEL:-INFO}",
      ]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXTERNAL_SERVICE_HOST: ${EXTERNAL_SERVICE_HOST}
      SYNC_FREQUENCY_MINUTES: ${SYNC_FREQUENCY_MINUTES}
      SERVICE_HOST: http://alert-collector-api:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
      - source: rabbit_mq_url
        target: RABBIT_MQ
      - rabbitmq_ca_cert
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    networks:
      - alert-collector-network
      - broker-network

  alert-collector-beat:
    build:
      context: ./alert-collector
      dockerfile: .docker/Dockerfile
    command:
      [
        "python",
        "-m",
        "alert_collector.cli",
        "beat",
        "--log-level",
        "${LOG_LEVEL:-INFO}",
      ]
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXTERNAL_SERVICE_HOST: ${EXTERNAL_SERVICE_HOST}
      SYNC_FREQUENCY_MINUTES: ${SYNC_FREQUENCY_MINUTES}
      SERVICE_HOST: http://alert-collector-api:8000
    secrets:
      - source: collector_database_url
        target: DATABASE_URL
      - source: external_mock_token
        target: EXTERNAL_SERVICE_TOKEN
      - source: rabbit_mq_url
        target: RABBIT_MQ
      - rabbitmq_ca_cert
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      external-mock:
        condition: service_healthy
    networks:
      - alert-collector-network
      - broker-network

networks:
  alert-collector-network:
  broker-network:

volumes:
  postgres-data:

secrets:
  postgres_user:
    file: ./secrets/postgres_user
  postgres_password:
    file: ./secrets/postgres_password
  external_mock_token:
    file: ./secrets/external_mock_token
  collector_database_url:
    file: ./secrets/collector_database_url
  rabbitmq_user:
    file: ./secrets/rabbitmq_user
  rabbitmq_password:
    file: ./secrets/rabbitmq_password
  rabbit_mq_url:
    file: ./secrets/rabbit_mq_url
  rabbitmq_ca_cert:
    file: ./secrets/rabbitmq_ca_cert.pem
  rabbitmq_server_cert:
    file: ./secrets/rabbitmq_server_cert.pem
  rabbitmq_server_key:
    file: ./secrets/rabbitmq_server_key.pem
